[enforcement]
landlock = "required"
cgroups = "required"
writable-roots = ["/tmp", "/var/tmp"]

[[zones]]
id = "readonly-research"
name = "Readonly Research"
description = "A protected zone for markdown and text research notes."
paths = ["/home/user/research"]
write_policy = "deny"
snapshot = "best-effort"

[[agents]]
id = "local-agent"
label = "Local Agent"
command = "agent-command"
