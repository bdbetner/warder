name: Beta reviewer feedback
description: Feedback from installing and testing a Warder public beta release.
title: "[beta feedback]: "
labels:
  - beta-feedback
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reviewing Warder. Please run the release-artifact flow in `docs/reviewer-feedback.md` before filing this when possible.
  - type: input
    id: release
    attributes:
      label: Release tested
      description: Example: v1.0.0-beta.1
      placeholder: v1.0.0-beta.1
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Linux distro and kernel
      description: Include distro/version and `uname -r` if available.
      placeholder: Ubuntu 26.04, kernel 6.x
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - .deb
        - RPM
        - AppImage plus CLI binary
        - Source checkout
        - Other
    validations:
      required: true
  - type: checkboxes
    id: flows
    attributes:
      label: Flows tested
      options:
        - label: Downloaded release assets and verified SHA256SUMS
        - label: Installed package or launched AppImage
        - label: Ran `warder profiles --format json`
        - label: Ran `warder explain`
        - label: Ran `warder dry-run`
        - label: Ran `warder run --launch`
        - label: Reviewed `warder receipt`
        - label: Reviewed `warder journal --file`
        - label: Launched `warder-desktop`
        - label: Tested GUI setup, dry-run, launch, and receipt review
  - type: textarea
    id: result
    attributes:
      label: What happened?
      description: Include commands, outputs, screenshots, or receipt snippets that clarify the issue or feedback.
    validations:
      required: true
  - type: textarea
    id: clarity
    attributes:
      label: Clarity feedback
      description: What was confusing, surprising, or too easy to misinterpret?
  - type: textarea
    id: trust
    attributes:
      label: Trust and safety feedback
      description: Did Warder make degraded protection obvious enough? Did any text overstate enforcement?
  - type: textarea
    id: next
    attributes:
      label: Most important next improvement
      description: Pick the next thing that would most improve your trust or ability to use Warder.
