name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example v0.1.0-alpha.3"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  linux-prerelease:
    name: Linux prerelease
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Validate release tag
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "release tag must look like vMAJOR.MINOR.PATCH: $RELEASE_TAG" >&2
            exit 1
          fi
          git rev-parse "$RELEASE_TAG^{commit}" >/dev/null

      - name: Require passing CI for release commit
        run: |
          release_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
          successful_runs="$(
            gh run list \
              --workflow CI \
              --commit "$release_commit" \
              --status success \
              --json databaseId \
              --jq length
          )"
          if [[ "$successful_runs" -lt 1 ]]; then
            echo "release tag $RELEASE_TAG points at $release_commit, but no successful CI run exists for that commit" >&2
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            clang \
            patchelf \
            fakeroot \
            rpm

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build eBPF file journal object
        run: scripts/build-ebpf-file-journal.sh

      - name: Build eBPF network journal object
        run: scripts/build-ebpf-network-journal.sh

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Run desktop GUI smoke
        working-directory: apps/desktop
        run: npm test

      - name: Build release CLI
        run: cargo build --release -p warder-cli --bin warder

      - name: Build desktop app
        working-directory: apps/desktop
        run: npm run tauri -- build --bundles deb,rpm,appimage --ci

      - name: Collect release artifacts
        run: scripts/collect-release-artifacts.sh --deb-dir target/release/bundle/deb --rpm-dir target/release/bundle/rpm --appimage-dir target/release/bundle/appimage --version "$RELEASE_TAG" --commit "$(git rev-parse HEAD)"

      - name: Check collected release metadata
        run: |
          cd release-artifacts
          sha256sum --check SHA256SUMS
          python3 -m json.tool release-manifest.json >/dev/null

      - name: Check artifact collection smoke
        run: scripts/release-artifacts-smoke.sh

      - name: Check Debian package smoke
        run: scripts/deb-artifact-smoke.sh

      - name: Check Debian install smoke
        run: scripts/deb-install-smoke.sh

      - name: Check AppImage package smoke
        run: scripts/appimage-artifact-smoke.sh

      - name: Check RPM package smoke
        run: scripts/rpm-artifact-smoke.sh

      - name: Check release trust policy
        run: scripts/release-trust-policy-smoke.sh

      - name: Write release notes
        run: scripts/write-release-notes.sh "$RELEASE_TAG" release-artifacts release-notes.md

      - name: Generate artifact attestations
        if: ${{ github.repository_visibility == 'public' }}
        uses: actions/attest@v4
        with:
          subject-path: |
            release-artifacts/warder
            release-artifacts/warder-desktop
            release-artifacts/*.deb
            release-artifacts/*.rpm
            release-artifacts/*.AppImage
            release-artifacts/SHA256SUMS
            release-artifacts/release-manifest.json

      - name: Publish GitHub prerelease
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "Warder $RELEASE_TAG" \
              --notes-file release-notes.md \
              --prerelease
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --title "Warder $RELEASE_TAG" \
              --notes-file release-notes.md \
              --prerelease \
              --verify-tag
          fi
