name: eBPF live smoke

on:
  workflow_dispatch:
    inputs:
      runner_labels:
        description: 'JSON array of runner labels for a privileged Linux runner, for example ["self-hosted","linux","x64","ebpf"]'
        required: true
        default: '["self-hosted","linux","x64","ebpf"]'
        type: string
      ebpf_object:
        description: "Optional prebuilt eBPF object path on the runner; leave blank to build Warder's bundled object"
        required: false
        type: string
      network_ebpf_object:
        description: "Optional prebuilt network eBPF object path on the runner; leave blank to build Warder's bundled object"
        required: false
        type: string

jobs:
  live-file-journal:
    name: Live file-journal eBPF smoke
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      WARDER_REQUIRE_LIVE_EBPF: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check host eBPF privileges
        run: |
          set -euo pipefail
          id
          if command -v capsh >/dev/null 2>&1; then
            capsh --print | sed -n '1,40p'
          fi
          test -d /sys/fs/bpf
          test -r /sys/fs/bpf
          test -w /sys/fs/bpf
          if [[ -r /proc/sys/kernel/unprivileged_bpf_disabled ]]; then
            cat /proc/sys/kernel/unprivileged_bpf_disabled
          fi

      - name: Install build dependencies when available
        run: |
          set -euo pipefail
          if command -v clang >/dev/null 2>&1; then
            clang --version
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1 && command -v sudo >/dev/null 2>&1; then
            sudo -n apt-get update
            sudo -n apt-get install -y clang
            exit 0
          fi
          echo "clang is required to build Warder's eBPF object" >&2
          exit 1

      - name: Run required live eBPF file-journal smoke
        env:
          INPUT_EBPF_OBJECT: ${{ inputs.ebpf_object }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_EBPF_OBJECT" ]]; then
            export WARDER_EBPF_FILE_OBJECT="$INPUT_EBPF_OBJECT"
          fi
          scripts/ebpf-file-journal-smoke.sh

      - name: Run required live eBPF network-journal smoke
        env:
          INPUT_EBPF_OBJECT: ${{ inputs.ebpf_object }}
          INPUT_NETWORK_EBPF_OBJECT: ${{ inputs.network_ebpf_object }}
        run: |
          set -euo pipefail
          if [[ -n "$INPUT_EBPF_OBJECT" ]]; then
            export WARDER_EBPF_FILE_OBJECT="$INPUT_EBPF_OBJECT"
          fi
          if [[ -n "$INPUT_NETWORK_EBPF_OBJECT" ]]; then
            export WARDER_EBPF_NETWORK_OBJECT="$INPUT_NETWORK_EBPF_OBJECT"
          fi
          scripts/ebpf-network-journal-smoke.sh
